apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatterbox-service
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatterbox-service
  template:
    metadata:
      labels:
        app: chatterbox-service
    spec:
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-tesla-t4
      containers:
        - name: chatterbox
          image: us-central1-docker.pkg.dev/PROJECT_ID/evently-repo/chatterbox-service:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              nvidia.com/gpu: 1
              memory: "8Gi"
              cpu: "4"
            requests:
              memory: "6Gi"
              cpu: "2"
          env:
            - name: GCS_BUCKET_NAME
              value: "sayops-recordings"
            - name: CHATTERBOX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: chatterbox-api-key
                  key: key
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60   # Model load takes ~30-45s on cold start
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: chatterbox-service
  namespace: default
  annotations:
    cloud.google.com/load-balancer-type: "Internal"
spec:
  selector:
    app: chatterbox-service
  ports:
    - port: 80
      targetPort: 8080
  type: LoadBalancer
